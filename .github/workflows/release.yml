name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-pipeline
      cancel-in-progress: true
    # Skip release commits (prevent loops) and non-code commits
    if: "!contains(github.event.head_commit.message, 'chore: release')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for code changes
        id: changes
        run: |
          CODE_CHANGES=$(git diff --name-only HEAD~1 HEAD -- \
            'packages/**' 'scripts/**' \
            'package.json' 'bunfig.toml' 'tsconfig*.json' \
            '.github/workflows/**' \
            | grep -v '\.md$' \
            | grep -v '\.jpg$' \
            | grep -v '\.jpeg$' \
            | grep -v '\.png$' \
            | grep -v '\.svg$' \
            | head -1 || true)
          if [ -z "$CODE_CHANGES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No code changes detected, skipping release"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Code changes detected, proceeding with release"
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.changes.outputs.skip != 'true'

      - name: Install dependencies
        if: steps.changes.outputs.skip != 'true'
        run: bun install

      - name: Build
        if: steps.changes.outputs.skip != 'true'
        run: bun run build

      - name: Configure Git
        if: steps.changes.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with remote main
        if: steps.changes.outputs.skip != 'true'
        run: |
          # Rebase onto the latest remote main before bumping so the version
          # commit and tag land on top of the final tree — not a stale snapshot
          # that would get rewritten later, leaving build-predictor and publish
          # checking out the wrong commit.
          git reset --hard HEAD
          git clean -fd
          git pull --rebase origin main

      - name: Bump version
        id: bump_version
        if: steps.changes.outputs.skip != 'true'
        run: |
          set -euo pipefail

          LOCAL_VERSION=$(jq -r '.version' packages/signetai/package.json)
          REMOTE_VERSION_JSON=$(git show 'origin/main:packages/signetai/package.json' 2>/dev/null || true)

          if [ -n "$REMOTE_VERSION_JSON" ]; then
            REMOTE_VERSION=$(printf '%s' "$REMOTE_VERSION_JSON" | jq -r '.version')
          else
            REMOTE_VERSION="$LOCAL_VERSION"
          fi

          BASE_VERSION=$(printf '%s\n%s\n' "$LOCAL_VERSION" "$REMOTE_VERSION" | sort -V | tail -n1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          bun scripts/changelog.ts

          BUMP=$(cat .bump-level 2>/dev/null || echo "patch")
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
            *)     NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
          esac

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "BUMP_LEVEL=$BUMP" >> $GITHUB_ENV
          echo "bump_level=$BUMP" >> $GITHUB_OUTPUT
          rm -f .bump-level

          PACKAGE_FILES=$(git ls-files package.json 'packages/**/package.json' | grep -v '^packages/cli/dashboard/package.json$')
          for file in $PACKAGE_FILES; do
            jq --arg v "$NEW_VERSION" '.version = $v' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
          done

          git add $PACKAGE_FILES CHANGELOG.md
          git commit -m "chore: release $NEW_VERSION"
          git tag "v$NEW_VERSION"

      - name: Push version bump
        if: steps.changes.outputs.skip != 'true'
        run: |
          git push origin HEAD:main
          git push origin "v$NEW_VERSION"

      - name: Create GitHub Release (draft)
        id: create_release
        if: steps.changes.outputs.skip != 'true'
        run: |
          NOTES=$(bun scripts/extract-changelog-section.ts "$NEW_VERSION" 2>/dev/null || echo "See CHANGELOG.md for details")
          # Create as draft — predictor assets are uploaded by build-predictor
          # before the publish job promotes this to non-draft and publishes npm.
          gh release create "v$NEW_VERSION" --draft --title "v$NEW_VERSION" --notes "$NOTES"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      version: ${{ steps.create_release.outputs.version }}
      skip: ${{ steps.changes.outputs.skip }}
      bump_level: ${{ steps.bump_version.outputs.bump_level }}

  build-predictor:
    needs: release
    if: needs.release.outputs.skip != 'true' && needs.release.outputs.version != ''
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: signet-predictor-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: signet-predictor-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: signet-predictor-darwin-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: signet-predictor-win32-x64.exe
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_VERSION: ${{ needs.release.outputs.version }}
      RELEASE_TARGET: ${{ matrix.target }}
      RELEASE_ASSET: ${{ matrix.asset }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build predictor
        run: cargo build --release --target "$RELEASE_TARGET"
        working-directory: packages/predictor

      - name: Upload to release
        shell: bash
        run: |
          EXT=""
          [ "$RUNNER_OS" = "Windows" ] && EXT=".exe"
          BINARY="packages/predictor/target/${RELEASE_TARGET}/release/signet-predictor${EXT}"
          gh release upload "v${RELEASE_VERSION}" "${BINARY}#${RELEASE_ASSET}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: [release, build-predictor]
    runs-on: ubuntu-latest
    # Run even if some build-predictor matrix legs fail — partial binary
    # coverage is better than blocking the entire release. Release job must
    # have succeeded for there to be anything to publish.
    if: always() && needs.release.result == 'success' && needs.release.outputs.skip != 'true' && needs.release.outputs.version != ''
    permissions:
      contents: write
    env:
      NEW_VERSION: ${{ needs.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Publish release
        # Undraft first so predictor assets are publicly accessible before
        # any npm install can trigger the postinstall downloader.
        run: gh release edit "v${NEW_VERSION}" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$NPM_CONFIG_USERCONFIG"
          CURRENT=$(npm view signetai version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$NEW_VERSION" ]; then
            echo "signetai@$NEW_VERSION already published, skipping"
          else
            cd packages/signetai && npm publish --tag next --access public
            cd ../adapters/openclaw && npm publish --tag next --access public || true
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/.npmrc

      - name: Promote to latest
        if: needs.release.outputs.bump_level != 'major'
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$NPM_CONFIG_USERCONFIG"
          npm dist-tag add "signetai@${NEW_VERSION}" latest
          npm dist-tag add "@signetai/signet-memory-openclaw@${NEW_VERSION}" latest || true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/.npmrc
