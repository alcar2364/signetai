name               = "signet-reviews"
main               = "src/index.ts"
compatibility_date = "2025-01-01"

[[d1_databases]]
binding       = "DB"
database_name = "signet-reviews"
database_id   = "d1fcce93-0b8a-4b95-b67d-39e9611dd4b3"

# Rate limiting: 5 sync requests per IP per 60 seconds
[[unsafe.bindings]]
name         = "RATE_LIMITER"
type         = "ratelimit"
namespace_id = "1001"
[unsafe.bindings.simple]
limit  = 5
period = 60

[vars]
CORS_ORIGIN = "https://marketplace.signetai.sh"
